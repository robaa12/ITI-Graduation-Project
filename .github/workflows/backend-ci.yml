name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - "**/*.md"
      - ".dockerignore"
      - "docker-compose.yml"
      - "Dockerfile"

  push:
    branches:
      - develop
      - main

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iti_grad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d iti_grad_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: iti_grad_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
